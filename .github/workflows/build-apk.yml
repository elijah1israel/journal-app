name: Build Android APK

on:
  # Build on every commit landing on the default branch and on explicit
  # dispatch. PR opens don't trigger a build — the APK is only meaningful
  # for what's actually in main.
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build-mode:
        description: 'Build mode'
        type: choice
        default: release
        options: [release, debug, profile]

permissions:
  contents: read

jobs:
  build-apk:
    name: Build APK (${{ github.event.inputs.build-mode || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      # The committed lib/ tree carries the cross-platform Dart source
      # only; the Android scaffolding is regenerated here so the workflow
      # stays the source of truth for build config. The default scaffold
      # ships a `test/widget_test.dart` that references the template
      # class name (`MyApp`) — we use `WickbookApp`, so drop that file
      # immediately to keep `flutter analyze` clean.
      #
      # `--project-name=wickbook` is required because the repository is
      # cloned into `journal-app/` (the GitHub repo name still uses a
      # hyphen). Without the override, `flutter create` infers the
      # package name from the directory and rejects "journal-app" —
      # Dart package names can't contain hyphens. The override forces
      # the lowercase brand name and keeps the inferred package name
      # aligned with our pubspec `name:`.
      - name: Regenerate platform folders
        run: |
          flutter create --platforms=android --project-name=wickbook .
          rm -f test/widget_test.dart

      - name: Flutter pub get
        run: flutter pub get

      # The Dart package name has to be lowercase (`wickbook`), and
      # `flutter create` carries that lowercase string straight through
      # to `android:label` in the AndroidManifest. Override it so the
      # launcher shows the brand-cased "Wickbook".
      - name: Set Android display name to "Wickbook"
        run: |
          sed -i \
            's|android:label="wickbook"|android:label="Wickbook"|g' \
            android/app/src/main/AndroidManifest.xml

      # `flutter create` only puts INTERNET in the debug & profile
      # manifests; the release manifest is silent and the production
      # APK would have no network access. Inject the permission into
      # the main manifest so the release build can hit the API.
      # Idempotent: only inserts if the line isn't already there.
      - name: Ensure INTERNET permission in release manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i \
              '/<application/i\    <uses-permission android:name="android.permission.INTERNET"/>' \
              "$MANIFEST"
          fi
          # Sanity check — fail the build early if the patch didn't land.
          grep -q 'android.permission.INTERNET' "$MANIFEST"

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Flutter analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Compute version
        id: ver
        run: |
          # Suffix the patch with the workflow run number so every CI
          # build has a strictly higher versionCode / versionName.
          base=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          major_minor=$(echo "$base" | awk -F. '{print $1"."$2}')
          build_name="${major_minor}.${GITHUB_RUN_NUMBER}"
          build_number="${GITHUB_RUN_NUMBER}"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "Building $build_name+$build_number"

      - name: Build APKs (split per ABI + universal)
        run: |
          MODE="${{ github.event.inputs.build-mode || 'release' }}"
          NAME="${{ steps.ver.outputs.build_name }}"
          NUMBER="${{ steps.ver.outputs.build_number }}"
          # Gradle's distribution download is occasionally flaky (504).
          # Retry the build a few times with backoff.
          retry() {
            local n=1
            until "$@"; do
              if [ "$n" -ge 4 ]; then
                echo "::error::Command failed after $n attempts: $*"
                return 1
              fi
              echo "::warning::Attempt $n failed; retrying in $((n*20))s…"
              sleep "$((n*20))"
              n=$((n+1))
            done
          }
          retry flutter build apk --"$MODE" --split-per-abi \
            --build-name="$NAME" --build-number="$NUMBER"
          retry flutter build apk --"$MODE" \
            --build-name="$NAME" --build-number="$NUMBER"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/
          ls -la artifacts/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: wickbook-${{ github.event.inputs.build-mode || 'release' }}-v${{ steps.ver.outputs.build_name }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
