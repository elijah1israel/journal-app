<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Soft-rounded square in brand ink -->
  <rect x="0" y="0" width="96" height="96" rx="22" ry="22" fill="#0F1B2D"/>
  <!-- Emerald candle wick + bullish candle body -->
  <rect x="44" y="20" width="8" height="56" rx="2" fill="#10B981" opacity="0.35"/>
  <rect x="38" y="34" width="20" height="34" rx="4" fill="#10B981"/>
  <!-- Subtle gridline so the icon reads as "chart" not just a tile -->
  <line x1="14" y1="72" x2="82" y2="72" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>
  <line x1="14" y1="58" x2="82" y2="58" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
</svg>
