name: wickbook
description: "Wickbook — mobile trade journal for active traders."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.5+1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  intl: ^0.20.1
  package_info_plus: ^8.1.2
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  # iOS is not generated by the build-apk workflow, so leave it off
  # here; flip back to true once we add an iOS build target and the
  # workflow runs `flutter create --platforms=android,ios`.
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0E1116"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/branding/wickbook-icon.svg
    - assets/branding/wickbook-logo-light.svg
    - assets/branding/wickbook-logo-dark.svg
